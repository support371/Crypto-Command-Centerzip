version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: tradingdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-tradingdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Execution Core ──────────────────────────────────────────
  execution-core:
    build:
      context: ./execution-core
      dockerfile: Dockerfile
    container_name: execution_core
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./execution-core:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Prediction Bot ──────────────────────────────────────────
  prediction-bot:
    build:
      context: ./prediction-bot
      dockerfile: Dockerfile
    container_name: prediction_bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - execution-core
      - redis
    volumes:
      - ./prediction-bot:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ── Guardian Bot ────────────────────────────────────────────
  guardian-bot:
    build:
      context: ./guardian-bot
      dockerfile: Dockerfile
    container_name: guardian_bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - execution-core
      - redis
      - postgres
    volumes:
      - ./guardian-bot:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - execution-core
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
